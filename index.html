<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS336 Quiz Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <button class="logo-button" id="homeButton" type="button">CS336 Quiz Prep</button>
    <nav class="top-nav" aria-label="Main navigation">
      <button type="button" data-view="home">Home</button>
      <button type="button" data-view="weak">Weak Topics</button>
      <button type="button" data-view="summary">Summary</button>
    </nav>
  </header>

  <main id="app" class="app-shell"></main>

  <template id="homeTemplate">
    <section class="hero">
      <p class="eyebrow">Concepts of Programming Languages</p>
      <h1>CS336<br>Quiz Prep</h1>
      <p class="hero-text">Fast revision for Weeks 1, 2, and 3 using your lecture PDFs only.</p>
    </section>

    <section class="button-grid" aria-label="Study actions">
      <button class="main-card" type="button" data-lecture="1">
        <span>Week 1 - Lecture 1</span>
        <strong>Introduction</strong>
      </button>
      <button class="main-card" type="button" data-lecture="2">
        <span>Week 2 - Lecture 2</span>
        <strong>Language Design Criteria</strong>
      </button>
      <button class="main-card" type="button" data-lecture="3">
        <span>Week 3 - Lecture 3</span>
        <strong>Logic Programming</strong>
      </button>
      <button class="main-card accent" type="button" data-mode="mcq">
        <span>Quiz Mode</span>
        <strong>Start Mixed Quiz</strong>
      </button>
      <button class="main-card accent" type="button" data-mode="tf">
        <span>Practice Mode</span>
        <strong>True / False Practice</strong>
      </button>
      <button class="main-card accent" type="button" data-mode="short">
        <span>Practice Mode</span>
        <strong>Short Answer Practice</strong>
      </button>
      <button class="main-card wide" type="button" data-view="summary">
        <div>
          <span>Memorize</span>
          <strong>Last-Minute Summary</strong>
        </div>
      </button>
    </section>
  </template>

  <script src="script.js"></script>
</body>
</html>
